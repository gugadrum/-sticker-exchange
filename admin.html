<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Admin — Sticker Exchange</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0e1a; color: #e8eaf0;
      min-height: 100vh; display: flex; align-items: center;
      justify-content: center; padding: 24px;
    }
    .card {
      background: #1c2438; border: 1px solid #2a3550;
      border-radius: 12px; padding: 32px;
      width: 100%; max-width: 520px;
      box-shadow: 0 4px 24px rgba(0,0,0,.5);
    }
    h1 { font-size: 1.4rem; margin-bottom: 6px; }
    .sub { color: #7b8ab8; font-size: .9rem; margin-bottom: 28px; }
    label { display: block; font-size: .83rem; color: #7b8ab8; margin-bottom: 6px; }
    input[type=password], input[type=number] {
      width: 100%; padding: 10px 14px;
      background: #141929; border: 1px solid #2a3550;
      border-radius: 8px; color: #e8eaf0; font-size: .95rem;
      outline: none; margin-bottom: 16px;
    }
    input:focus { border-color: #4f9cf9; }
    input[type=number] { max-width: 120px; }
    .row { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 16px; }
    .row input { margin-bottom: 0; }
    .btn {
      padding: 10px 22px; border: none; border-radius: 8px;
      font-size: .95rem; font-weight: 600; cursor: pointer; transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn-primary { background: #4f9cf9; color: #fff; }
    .btn-ghost { background: #2a3550; color: #e8eaf0; }
    .alert {
      padding: 12px 16px; border-radius: 8px;
      font-size: .9rem; margin-bottom: 16px;
    }
    .alert-error   { background: rgba(248,113,113,.15); border: 1px solid rgba(248,113,113,.4); color: #f87171; }
    .alert-success { background: rgba(52,211,153,.12);  border: 1px solid rgba(52,211,153,.35); color: #34d399; }
    #result { margin-top: 20px; }
    .code-list {
      background: #141929; border: 1px solid #2a3550;
      border-radius: 8px; padding: 8px 0;
    }
    .code-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; border-bottom: 1px solid #1c2438; gap: 12px;
    }
    .code-row:last-child { border-bottom: none; }
    .code-val { font-family: monospace; font-size: 1rem; letter-spacing: .05em; }
    .code-val.fresh  { color: #34d399; font-weight: 700; }
    .code-val.used   { color: #7b8ab8; text-decoration: line-through; }
    .tag-used  { font-size: .78rem; color: #7b8ab8; }
    .copy-btn {
      background: #2a3550; border: none; color: #e8eaf0;
      padding: 5px 12px; border-radius: 6px; cursor: pointer;
      font-size: .8rem; font-weight: 600;
    }
    .copy-btn:hover { background: #4f9cf9; }
    .copy-btn.copied { background: #34d399; color: #111; }
    .divider { border: none; border-top: 1px solid #2a3550; margin: 20px 0; }
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.3); border-top-color: #fff;
      border-radius: 50%; animation: spin .6s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="card">
  <h1>⚙️ Admin Panel</h1>
  <p class="sub">Generate invite codes for FIFA 2026 Sticker Exchange</p>

  <div id="alert"></div>

  <label>Admin password</label>
  <input type="password" id="pw" placeholder="Enter your admin password" />

  <label>Number of codes to generate</label>
  <div class="row">
    <input type="number" id="qty" value="10" min="1" max="100" />
    <button class="btn btn-primary" id="gen-btn" onclick="generateCodes()">Generate</button>
  </div>

  <hr class="divider"/>
  <button class="btn btn-ghost" onclick="listCodes()" style="width:100%">
    View all existing codes
  </button>

  <div id="result"></div>
</div>

<script>
  function pw()  { return document.getElementById('pw').value.trim(); }
  function qty() { return parseInt(document.getElementById('qty').value) || 10; }

  function showAlert(msg, type) {
    document.getElementById('alert').innerHTML =
      '<div class="alert alert-' + type + '">' + msg + '</div>';
  }
  function clearAlert() {
    document.getElementById('alert').innerHTML = '';
  }

  function copyCode(btn, code) {
    navigator.clipboard.writeText(code).then(function() {
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(function() {
        btn.textContent = 'Copy';
        btn.classList.remove('copied');
      }, 1500);
    });
  }

  function renderCodes(list) {
    if (!list.length) {
      document.getElementById('result').innerHTML =
        '<p style="color:#7b8ab8;margin-top:16px;font-size:.9rem">No codes yet.</p>';
      return;
    }
    var html = '<div class="code-list" style="margin-top:16px">';
    for (var i = 0; i < list.length; i++) {
      var c = list[i];
      var cls = c.used ? 'used' : 'fresh';
      var action = c.used
        ? '<span class="tag-used">used</span>'
        : '<button class="copy-btn" onclick="copyCode(this,\'' + c.code + '\')">Copy</button>';
      html += '<div class="code-row">'
            + '<span class="code-val ' + cls + '">' + c.code + '</span>'
            + action
            + '</div>';
    }
    html += '</div>';
    document.getElementById('result').innerHTML = html;
  }

  function setLoading(loading) {
    var btn = document.getElementById('gen-btn');
    btn.disabled = loading;
    btn.innerHTML = loading ? '<span class="spinner"></span>Generating…' : 'Generate';
  }

  async function generateCodes() {
    clearAlert();
    if (!pw()) { showAlert('Please enter the admin password.', 'error'); return; }
    setLoading(true);
    try {
      var res = await fetch('/api/admin/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw(), count: qty() })
      });
      var data = await res.json();
      if (!res.ok) {
        showAlert(data.error || 'Error: ' + res.status, 'error');
      } else {
        showAlert('✅ Generated ' + data.codes.length + ' new codes!', 'success');
        renderCodes(data.codes.map(function(c) { return { code: c, used: false }; }));
      }
    } catch (err) {
      showAlert('Network error: ' + err.message, 'error');
    }
    setLoading(false);
  }

  async function listCodes() {
    clearAlert();
    if (!pw()) { showAlert('Please enter the admin password first.', 'error'); return; }
    document.getElementById('result').innerHTML =
      '<p style="color:#7b8ab8;margin-top:16px"><span class="spinner"></span>Loading…</p>';
    try {
      var res = await fetch('/api/admin/codes', {
        headers: { 'X-Admin-Password': pw() }
      });
      var data = await res.json();
      if (!res.ok) {
        showAlert(data.error || 'Error: ' + res.status, 'error');
        document.getElementById('result').innerHTML = '';
      } else {
        renderCodes(data);
      }
    } catch (err) {
      showAlert('Network error: ' + err.message, 'error');
    }
  }
</script>
</body>
</html>
